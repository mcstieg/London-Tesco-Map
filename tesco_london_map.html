var map = L.map('map').setView([51.49, -0.12], 11);

var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

var tileErrorShown = false;
tileLayer.on('tileerror', function() {
  if (!tileErrorShown) {
    tileErrorShown = true;
    document.getElementById('tile-warning').style.display = 'block';
  }
});

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: '<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="8" fill="' + color + '" stroke="white" stroke-width="2.5"/></svg>',
    iconSize: [18, 18],
    iconAnchor: [9, 9],
    popupAnchor: [0, -12]
  });
}

var icons = {
  supermarket: makeIcon('#1565C0'),
  express: makeIcon('#E53935')
};

var layers = { supermarket: L.layerGroup(), express: L.layerGroup() };

stores.forEach(function(s) {
  var label = s.name;
  var typeLabel = s.type === 'supermarket' ? 'Supermarket / Extra' : 'Express';
  var addrLine = [s.address, s.postcode].filter(Boolean).join(', ');
  var popup = '<div class="popup-name">' + label + '</div>'
            + '<div class="popup-type ' + s.type + '">' + typeLabel + '</div>'
            + (addrLine ? '<div class="popup-addr">' + addrLine + '</div>' : '');
  L.marker([s.lat, s.lon], { icon: icons[s.type] })
    .bindPopup(popup)
    .addTo(layers[s.type]);
});

layers.supermarket.addTo(map);
layers.express.addTo(map);

function updateCount() {
  var smOn = document.getElementById('show-supermarket').checked;
  var exOn = document.getElementById('show-express').checked;
  var smCount = stores.filter(function(s) { return s.type === 'supermarket'; }).length;
  var exCount = stores.filter(function(s) { return s.type === 'express'; }).length;
  var total = (smOn ? smCount : 0) + (exOn ? exCount : 0);
  document.getElementById('count').textContent = 'Showing ' + total + ' of ' + stores.length + ' locations';
}

document.getElementById('show-supermarket').addEventListener('change', function() {
  if (this.checked) layers.supermarket.addTo(map); else map.removeLayer(layers.supermarket);
  updateCount();
});
document.getElementById('show-express').addEventListener('change', function() {
  if (this.checked) layers.express.addTo(map); else map.removeLayer(layers.express);
  updateCount();
});

updateCount();
</script>
